<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hybrid Chatbot</title>
    <link rel="stylesheet" href="/style.css?v=20260401b">
</head>
<body class="auth-page dark-theme">
    <div class="auth-shell">
        <section class="auth-showcase dark-panel">
            <div class="brand-block">
                <div class="auth-badge">ECE-BOT</div>
                <h1>ECE-BOT</h1>
                <p class="showcase-text">
                    Crafted by Yajvendra and Jeet Bhai with &#10084;&#65039;
                </p>
            </div>
        </section>

        <section class="auth-card dark-card">
            <h2>Login</h2>
            <p class="page-text">Sign in to open your saved chats.</p>

            <form id="login-form">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>

                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>

                <button type="submit">Login</button>
            </form>

            <button type="button" id="show-forgot-password" class="link-button">Forgot Password?</button>

            <div id="forgot-password-panel" class="forgot-panel hidden-block">
                <h3>Reset Password</h3>
                <p id="forgot-subtitle" class="page-text">Enter your email to receive an OTP.</p>

                <form id="forgot-email-form">
                    <label for="forgot-email">Email</label>
                    <input type="email" id="forgot-email" placeholder="Enter your email">
                    <button type="submit">Send OTP</button>
                </form>

                <form id="forgot-otp-form" class="hidden-block">
                    <label for="forgot-otp">OTP</label>
                    <input type="text" id="forgot-otp" placeholder="Enter 6-digit OTP" maxlength="6" inputmode="numeric">
                    <button type="submit">Verify OTP</button>
                </form>

                <form id="reset-password-form" class="hidden-block">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" placeholder="Enter new password">
                    <button type="submit">Update Password</button>
                </form>

                <button type="button" id="close-forgot-password" class="ghost-button">Close</button>
            </div>

            <p id="message-box" class="message-box"></p>

            <p class="page-text auth-footer">
                Don't have an account?
                <a href="/signup">Create one</a>
            </p>
        </section>
    </div>

    <script src="/auth.js?v=20260401b"></script>
</body>
</html>
